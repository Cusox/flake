services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/docker/traefik/data:/data
    command:
      - "--api=true"

      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=proxy"

      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"

      - "--certificatesresolvers.cloudflare.acme.email=cusoxlee@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.dnsChallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnsChallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.storage=/data/acme.json"

      - "--experimental.fastProxy"
    labels:
      - "traefik.enable=true"

      - "traefik.http.middlewares.auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.secureHeaders.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secureHeaders.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.secureHeaders.headers.frameDeny=true"
      - "traefik.http.middlewares.secureHeaders.headers.contentTypeNosniff=true"

      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.rule=${RULE}"
      - "traefik.http.routers.dashboard.middlewares=auth@docker,secureHeaders@docker"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls.certResolver=cloudflare"

networks:
  proxy:
    name: proxy
